<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Executive Cost Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-kpi { border-left: 5px solid #0d6efd; border-radius: 8px; }
        .chart-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 20px; }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; font-size: 0.85rem; }
        .legend-color { width: 12px; height: 12px; border-radius: 2px; margin-right: 8px; }
        .tooltip {
            position: absolute; opacity: 0; background: #333; color: #fff;
            padding: 8px; border-radius: 4px; pointer-events: none; font-size: 12px;
        }
        .bar-label { font-size: 11px; fill: #333; font-weight: bold; }
    </style>
</head>
<body class="p-4">
    <div class="container-fluid">
        <h2 class="mb-4">Cloud Operations Financial Overview</h2>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card card-kpi shadow-sm p-3 bg-white">
                    <small class="text-muted text-uppercase fw-bold">Total Estimated Spend</small>
                    <h3 id="total-spend" class="text-primary">$0.00</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-kpi shadow-sm p-3 bg-white" style="border-left-color: #198754;">
                    <small class="text-muted text-uppercase fw-bold">Active Projects</small>
                    <h3 id="active-projects">0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-kpi shadow-sm p-3 bg-white" style="border-left-color: #ffc107;">
                    <small class="text-muted text-uppercase fw-bold">Average Item Cost</small>
                    <h3 id="avg-cost">$0.00</h3>
                </div>
            </div>
        </div>

        <div class="row mb-4 g-3 align-items-end chart-card mx-0">
            <div class="col-md-3">
                <label class="form-label fw-bold">Date Range</label>
                <div class="input-group">
                    <input type="date" id="start_date" class="form-control" value="2025-01-01">
                    <input type="date" id="end_date" class="form-control" value="2026-12-31">
                </div>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Project Filters</label>
                <select id="projects" class="form-select" multiple>
                    {% for p in projects %}
                    <option value="{{p}}" selected>{{p}}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <button class="btn btn-dark w-100" onclick="refreshAll()">Apply Filters</button>
            </div>
        </div>

        <ul class="nav nav-pills mb-3" id="mainTabs">
            {% for tab in tabs %}
            <li class="nav-item">
                <button class="nav-link {{ 'active' if loop.first }}"
                        onclick="currentTab='{{tab.id}}'; refreshAll()">{{tab.label}}</button>
            </li>
            {% endfor %}
        </ul>

        <div class="row">
            <div class="col-lg-5">
                <div class="chart-card">
                    <h5>Cost Composition</h5>
                    <div id="pie-container" style="display:flex;">
                        <div id="pie-viz"></div>
                        <div id="pie-legend" class="ms-3 pt-4"></div>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="chart-card">
                    <h5>Ranked Expenditure</h5>
                    <div id="hist-viz"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="tooltip" class="tooltip"></div>

    <script>
        let currentTab = '{{ tabs[0].id }}';
        const colors = d3.scaleOrdinal(d3.schemeTableau10);
        const formatCurrency = d3.format("$,.2f");

        function refreshAll() {
            const start = document.getElementById('start_date').value;
            const end = document.getElementById('end_date').value;
            const projects = Array.from(document.getElementById('projects').selectedOptions).map(o => o.value);

            let queryParams = `start_date=${start}&end_date=${end}`;
            projects.forEach(p => queryParams += `&projects[]=${encodeURIComponent(p)}`);

            // Update Summary Cards
            fetch(`/api/summary?${queryParams}`).then(res => res.json()).then(data => {
                document.getElementById('total-spend').innerText = data.total;
                document.getElementById('active-projects').innerText = data.project_count;
                document.getElementById('avg-cost').innerText = data.avg;
            });

            // Update Charts
            fetch(`/api/data/${currentTab}?${queryParams}`).then(res => res.json()).then(data => {
                // IMPORTANT: Sort data for management view
                data.sort((a, b) => b.value - a.value);
                renderPie(data);
                renderHorizontalBar(data);
            });
        }

        function renderPie(data) {
            const container = d3.select("#pie-viz");
            const legendContainer = d3.select("#pie-legend");
            container.selectAll("*").remove();
            legendContainer.selectAll("*").remove();

            const size = 300;
            const radius = size / 2;
            const svg = container.append("svg").attr("width", size).attr("height", size)
                        .append("g").attr("transform", `translate(${radius},${radius})`);

            const pie = d3.pie().value(d => d.value);
            const arc = d3.arc().innerRadius(radius * 0.5).outerRadius(radius); // Donut style is more modern

            svg.selectAll('path').data(pie(data)).enter().append('path')
                .attr('d', arc).attr('fill', (d,i) => colors(i))
                .attr("stroke", "white").style("stroke-width", "2px");

            // Build Legend
            data.forEach((d, i) => {
                const item = legendContainer.append("div").attr("class", "legend-item");
                item.append("div").attr("class", "legend-color").style("background", colors(i));
                item.append("span").text(`${d.label}: ${formatCurrency(d.value)}`);
            });
        }

        function renderHorizontalBar(data) {
            const container = d3.select("#hist-viz");
            container.selectAll("*").remove();

            const margin = {top: 10, right: 100, bottom: 30, left: 120},
                  width = container.node().clientWidth - margin.left - margin.right,
                  height = 350 - margin.top - margin.bottom;

            const svg = container.append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

            const x = d3.scaleLinear().domain([0, d3.max(data, d => d.value)]).range([0, width]);
            const y = d3.scaleBand().range([0, height]).domain(data.map(d => d.label)).padding(0.2);

            svg.append("g").call(d3.axisLeft(y).tickSize(0)).selectAll("text").style("font-weight", "bold");

            svg.selectAll("rect").data(data).enter().append("rect")
                .attr("x", x(0)).attr("y", d => y(d.label))
                .attr("width", d => x(d.value)).attr("height", y.bandwidth())
                .attr("fill", (d,i) => colors(i)).attr("rx", 4);

            // Add value labels at the end of bars
            svg.selectAll(".bar-label").data(data).enter().append("text")
                .attr("class", "bar-label")
                .attr("x", d => x(d.value) + 5)
                .attr("y", d => y(d.label) + y.bandwidth()/2 + 4)
                .text(d => formatCurrency(d.value));
        }

        window.onload = refreshAll;
    </script>
</body>
</html>
