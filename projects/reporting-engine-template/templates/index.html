<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cost Analytics Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .chart-container { display: flex; justify-content: space-around; flex-wrap: wrap; margin-top: 20px; }
        .chart { border: 1px solid #ddd; padding: 10px; border-radius: 8px; background: #f9f9f9; }
        .bar { fill: steelblue; }
        .bar:hover { fill: orange; }
    </style>
</head>
<body class="p-4">
<div class="container">
    <h2>Infrastructure Cost Dashboard</h2>

    <div class="row my-4 p-3 bg-light border rounded">
        <div class="col-md-3">
            <label>Start Date</label>
            <input type="date" id="start_date" class="form-control" value="2025-01-01">
        </div>
        <div class="col-md-3">
            <label>End Date</label>
            <input type="date" id="end_date" class="form-control" value="2026-12-31">
        </div>
        <div class="col-md-4">
            <label>Projects</label>
            <select id="projects" class="form-select" multiple>
                {% for p in projects %}
                <option value="{{p}}" selected>{{p}}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-primary w-100" onclick="refreshData()">Update</button>
        </div>
    </div>

    <ul class="nav nav-tabs" id="myTab" role="tablist">
        {% for tab in tabs %}
        <li class="nav-item">
            <button class="nav-link {{ 'active' if loop.first }}" id="{{tab.id}}-tab"
                    data-bs-toggle="tab" data-bs-target="#{{tab.id}}" type="button"
                    onclick="currentTab='{{tab.id}}'; refreshData()">{{tab.label}}
            </button>
        </li>
        {% endfor %}
    </ul>

    <div class="tab-content" id="myTabContent">
        {% for tab in tabs %}
        <div class="tab-pane fade {{ 'show active' if loop.first }}" id="{{tab.id}}">
            <div class="chart-container">
                <div id="pie-{{tab.id}}" class="chart"><h5>Cost Distribution (Pie)</h5></div>
                <div id="hist-{{tab.id}}" class="chart"><h5>Cost Comparison (Histogram)</h5></div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentTab = '{{ tabs[0].id }}';

    function refreshData() {
        const start = document.getElementById('start_date').value;
        const end = document.getElementById('end_date').value;
        const projects = Array.from(document.getElementById('projects').selectedOptions).map(o => o.value);

        let url = `/api/data/${currentTab}?start_date=${start}&end_date=${end}`;
        projects.forEach(p => url += `&projects[]=${encodeURIComponent(p)}`);

        fetch(url).then(res => res.json()).then(data => {
            renderPie(`pie-${currentTab}`, data);
            renderHist(`hist-${currentTab}`, data);
        });
    }

    function renderPie(containerId, data) {
        d3.select(`#${containerId} svg`).remove();
        const width = 400, height = 400, margin = 40;
        const radius = Math.min(width, height) / 2 - margin;

        const svg = d3.select(`#${containerId}`).append("svg")
            .attr("width", width).attr("height", height)
            .append("g").attr("transform", `translate(${width/2},${height/2})`);

        const color = d3.scaleOrdinal(d3.schemeCategory10);
        const pie = d3.pie().value(d => d.value);
        const arc = d3.arc().innerRadius(0).outerRadius(radius);

        svg.selectAll('slices')
            .data(pie(data)).enter().append('path')
            .attr('d', arc).attr('fill', d => color(d.data.label))
            .attr("stroke", "white").style("stroke-width", "2px");

        svg.selectAll('labels')
            .data(pie(data)).enter().append('text')
            .text(d => d.data.label)
            .attr("transform", d => `translate(${arc.centroid(d)})`)
            .style("text-anchor", "middle").style("font-size", 12);
    }

    // horizontal histogram
    function renderHist(containerId, data) {
    // 1. Clear previous chart
    d3.select(`#${containerId} svg`).remove();

    // 2. Setup dimensions (Increased left margin for long labels)
    const margin = {top: 30, right: 30, bottom: 50, left: 100},
          width = 500 - margin.left - margin.right,
          height = 400 - margin.top - margin.bottom;

    const svg = d3.select(`#${containerId}`).append("svg")
        .attr("width", width + margin.left + margin.right)
        .attr("height", height + margin.top + margin.bottom)
      .append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

    // 3. X-axis: Linear Scale (Cost Values)
    const x = d3.scaleLinear()
        .domain([0, d3.max(data, d => d.value)])
        .range([0, width]);

    svg.append("g")
       .attr("transform", `translate(0,${height})`)
       .call(d3.axisBottom(x).ticks(5).tickFormat(d3.format("$,.0f")));

    // 4. Y-axis: Band Scale (Categories/Labels)
    const y = d3.scaleBand()
        .range([0, height])
        .domain(data.map(d => d.label))
        .padding(0.2);

    svg.append("g")
       .call(d3.axisLeft(y));

    // 5. Render Horizontal Bars
    svg.selectAll("rect")
        .data(data)
        .enter()
        .append("rect")
        .attr("x", x(0)) // Start at the origin
        .attr("y", d => y(d.label)) // Position on Y-axis
        .attr("width", d => x(d.value)) // Width represents the value
        .attr("height", y.bandwidth()) // Height is the thickness of the band
        .attr("fill", "steelblue")
        .on("mouseover", function() { d3.select(this).attr("fill", "orange"); })
        .on("mouseout", function() { d3.select(this).attr("fill", "steelblue"); });
    }
    // vertical historgram
    function renderHist1(containerId, data) {
        d3.select(`#${containerId} svg`).remove();
        const margin = {top: 30, right: 30, bottom: 70, left: 60},
              width = 460 - margin.left - margin.right,
              height = 400 - margin.top - margin.bottom;

        const svg = d3.select(`#${containerId}`).append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
          .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

        const x = d3.scaleBand().range([0, width]).domain(data.map(d => d.label)).padding(0.2);
        svg.append("g").attr("transform", `translate(0,${height})`)
           .call(d3.axisBottom(x)).selectAll("text").attr("transform", "translate(-10,0)rotate(-45)").style("text-anchor", "end");

        const y = d3.scaleLinear().domain([0, d3.max(data, d => d.value)]).range([height, 0]);
        svg.append("g").call(d3.axisLeft(y));

        svg.selectAll("bar").data(data).enter().append("rect")
           .attr("x", d => x(d.label)).attr("y", d => y(d.value))
           .attr("width", x.bandwidth()).attr("height", d => height - y(d.value))
           .attr("fill", "steelblue");
    }

    // Initial Load
    window.onload = refreshData;
</script>
</body>
</html>
