<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Executive Cost Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .card-kpi { border-left: 5px solid #0d6efd; border-radius: 8px; }
        .chart-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 20px; }
        .bar-label { font-size: 11px; fill: #333; font-weight: bold; }
    </style>
</head>
<body class="p-4">
    <div class="container-fluid">
        <h2 class="mb-4">Cloud Operations Financial Overview</h2>

        <div class="row mb-4">
            <div class="col-md-4"><div class="card card-kpi shadow-sm p-3 bg-white"><small class="text-muted fw-bold">Total Spend</small><h3 id="total-spend" class="text-primary">$0.00</h3></div></div>
            <div class="col-md-4"><div class="card card-kpi shadow-sm p-3 bg-white" style="border-left-color: #198754;"><small class="text-muted fw-bold">Projects</small><h3 id="active-projects">0</h3></div></div>
            <div class="col-md-4"><div class="card card-kpi shadow-sm p-3 bg-white" style="border-left-color: #ffc107;"><small class="text-muted fw-bold">Avg Cost</small><h3 id="avg-cost">$0.00</h3></div></div>
        </div>

    <div class="row mb-4 g-3 align-items-end chart-card mx-0">
        <div class="col-md-2">
            <label class="form-label fw-bold">Date Range</label>
            <input type="date" id="start_date" class="form-control mb-1" value="2025-01-01">
            <input type="date" id="end_date" class="form-control" value="2026-12-31">
        </div>
        <div class="col-md-4">
            <label class="form-label fw-bold">Projects</label>
            <select id="projects" class="form-select" multiple style="height: 85px;">
                {% for p in projects %}
                <option value="{{p}}" selected>{{p}}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label fw-bold">Cost Centers</label>
            <select id="cost_centers" class="form-select" multiple style="height: 85px;">
                {% for cc in cost_centers %}
                <option value="{{cc}}" selected>{{cc}}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-2">
            <button class="btn btn-dark w-100 py-3" onclick="refreshAll()">Apply Filters</button>
        </div>
    </div>
        <ul class="nav nav-pills mb-3" id="mainTabs">
            {% for tab in tabs %}
            <li class="nav-item">
                <button class="nav-link {{ 'active' if loop.first }}" data-bs-toggle="pill" onclick="currentTab='{{tab.id}}'; refreshAll()">{{tab.label}}</button>
            </li>
            {% endfor %}
        </ul>

        <div id="viz-container" class="row">
            <div class="col-12" id="forecast-view" style="display:none;">
                <div class="chart-card"><h5>6-Month Spend Projection</h5><div id="line-viz"></div></div>
            </div>
            <div class="col-md-5 chart-standard">
                <div class="chart-card"><h5>Composition</h5><div id="pie-viz"></div></div>
            </div>
            <div class="col-md-7 chart-standard">
                <div class="chart-card"><h5>Ranked Expenditure</h5><div id="hist-viz"></div></div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = '{{ tabs[0].id }}';
        const colors = d3.scaleOrdinal(d3.schemeTableau10);

        function refreshAll() {
            const start = document.getElementById('start_date').value;
            const end = document.getElementById('end_date').value;
            const projects = Array.from(document.getElementById('projects').selectedOptions).map(o => o.value);
            const cost_centers = Array.from(document.getElementById('cost_centers').selectedOptions).map(o => o.value);

            let params = `start_date=${start}&end_date=${end}`;
            projects.forEach(p => params += `&projects[]=${encodeURIComponent(p)}`);
            cost_centers.forEach(cc => params += `&cost_centers[]=${encodeURIComponent(cc)}`);

            // Update KPIs
            fetch(`/api/summary?${params}`).then(r => r.json()).then(d => {
                document.getElementById('total-spend').innerText = d.total;
                document.getElementById('active-projects').innerText = d.project_count;
                document.getElementById('avg-cost').innerText = d.avg;
            });

            if (currentTab === 'forecast') {
                document.querySelectorAll('.chart-standard').forEach(e => e.style.display = 'none');
                document.getElementById('forecast-view').style.display = 'block';
                fetch('/api/forecast').then(r => r.json()).then(renderLine);
            } else {
                document.querySelectorAll('.chart-standard').forEach(e => e.style.display = 'block');
                document.getElementById('forecast-view').style.display = 'none';
                fetch(`/api/data/${currentTab}?${params}`).then(r => r.json()).then(data => {
                    data.sort((a,b) => b.value - a.value);
                    renderPie(data);
                    renderBar(data);
                });
            }
        }

        function renderLine(data) {
            const container = d3.select("#line-viz");
            container.selectAll("*").remove();
            const w = container.node().clientWidth - 100, h = 350;
            const svg = container.append("svg").attr("width", w + 100).attr("height", h + 50).append("g").attr("transform", "translate(60,20)");
            const parse = d3.timeParse("%Y-%m-%d");
            const all = [...data.history, ...data.forecast].map(d => ({...d, dt: parse(d.date)}));
            const x = d3.scaleTime().domain(d3.extent(all, d => d.dt)).range([0, w]);
            const y = d3.scaleLinear().domain([0, d3.max(all, d => d.value) * 1.1]).range([h, 0]);

            svg.append("g").attr("transform", `translate(0,${h})`).call(d3.axisBottom(x));
            svg.append("g").call(d3.axisLeft(y).tickFormat(d3.format("$,.0f")));

            const line = d3.line().x(d => x(parse(d.date))).y(d => y(d.value));
            svg.append("path").datum(data.history).attr("fill","none").attr("stroke","#0d6efd").attr("stroke-width",3).attr("d",line);
            svg.append("path").datum([data.history[data.history.length-1], ...data.forecast]).attr("fill","none").attr("stroke","#198754").attr("stroke-width",3).attr("stroke-dasharray","5,5").attr("d",line);
        }

        function renderPie(data) {
            const container = d3.select("#pie-viz"); container.selectAll("*").remove();
            const size = 300, radius = size / 2;
            const svg = container.append("svg").attr("width", size).attr("height", size).append("g").attr("transform", `translate(${radius},${radius})`);
            const pie = d3.pie().value(d => d.value);
            const arc = d3.arc().innerRadius(radius * 0.5).outerRadius(radius);
            svg.selectAll('path').data(pie(data)).enter().append('path').attr('d', arc).attr('fill', (d,i) => colors(i)).attr("stroke", "white");
        }

        function renderBar(data) {
            const container = d3.select("#hist-viz"); container.selectAll("*").remove();
            const margin = {top: 10, right: 80, bottom: 30, left: 120}, w = container.node().clientWidth - margin.left - margin.right, h = 350 - margin.top - margin.bottom;
            const svg = container.append("svg").attr("width", w + margin.left + margin.right).attr("height", h + margin.top + margin.bottom).append("g").attr("transform", `translate(${margin.left},${margin.top})`);
            const x = d3.scaleLinear().domain([0, d3.max(data, d => d.value)]).range([0, w]);
            const y = d3.scaleBand().domain(data.map(d => d.label)).range([0, h]).padding(0.2);
            svg.append("g").call(d3.axisLeft(y).tickSize(0));
            svg.selectAll("rect").data(data).enter().append("rect").attr("y", d => y(d.label)).attr("width", d => x(d.value)).attr("height", y.bandwidth()).attr("fill", (d,i) => colors(i)).attr("rx", 4);
        }

        window.onload = refreshAll;
    </script>
</body>
</html>
