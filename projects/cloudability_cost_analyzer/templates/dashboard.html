<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cost Reports - Reporting Engine</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1>📊 Cost Reporting Dashboard</h1>
        <p class="subtitle">Configuration-driven cost analysis and visualization</p>
    </header>

    <!-- Main Layout with Sidebar and Tabs -->
    <div class="dashboard-wrapper">
        <!-- Left Sidebar with Tab List -->
        <aside class="sidebar">
            <div class="sidebar-header">Reports</div>
            <div class="sidebar-content">
                {% for tab in tabs %}
                <div class="sidebar-item" data-tab-id="{{ tab.id }}" title="{{ tab.description }}">
                    <span class="tab-icon">📊</span>
                    <span class="tab-label">{{ tab.name }}</span>
                </div>
                {% endfor %}
            </div>
        </aside>

        <!-- Right Side with Dynamic Tabs -->
        <div class="main-area">
            <!-- Tab Bar -->
            <nav class="tabs-nav">
                <div class="tabs-container" id="tabs-container">
                    <!-- Dynamic tabs added here -->
                </div>
            </nav>

            <!-- Tab Contents -->
            <main class="tab-contents" id="tab-contents">
                <!-- Dynamic tab contents added here -->
            </main>

            <!-- Footer -->
            <footer class="footer">
                <p>Reporting Engine • Config-driven • Dynamic queries • Real-time visualization</p>
            </footer>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
