# Top 10 Users by Cost
# Standard SQL Query

sql: |
  SELECT
    full_name,
    block_funding,
    vp,
    total_cost,
    efficient_score
  FROM cost_report
  ORDER BY total_cost DESC
  LIMIT 10

# Chart configuration
chart:
  title: "Top 10 Users by Total Cost"
  type: "bar"
  x_axis: "full_name"
  y_axis: "total_cost"
  x_label: "User"
  y_label: "Total Cost ($)"
  show_values: true

# Display as table
display:
  type: "both"
  rows_per_page: 10
  sortable: true

# Format options
format:
  currency: true
  decimal_places: 0
