# Efficiency Scores by VP
# Standard SQL Query

sql: |
  SELECT
    vp,
    COUNT(DISTINCT user_id) as user_count,
    AVG(efficient_score) as avg_efficiency,
    MIN(efficient_score) as min_efficiency,
    MAX(efficient_score) as max_efficiency,
    SUM(total_cost) as total_cost
  FROM cost_report
  GROUP BY vp
  ORDER BY avg_efficiency DESC

# Chart configuration
chart:
  title: "Efficiency Scores by VP"
  type: "bar"
  x_axis: "vp"
  y_axis: "avg_efficiency"
  x_label: "VP"
  y_label: "Average Efficiency Score (%)"
  show_values: true

# Display as table
display:
  type: "both"
  rows_per_page: 20
  sortable: true

# Format options
format:
  add_percent_sign: true
  decimal_places: 1
