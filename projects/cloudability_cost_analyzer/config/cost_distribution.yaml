# Cost Distribution (Pie Chart)
# Standard SQL Query

sql: |
  SELECT
    block_funding,
    SUM(total_cost) as total_cost
  FROM cost_report
  GROUP BY block_funding
  ORDER BY total_cost DESC
  LIMIT 10

# Chart configuration
chart:
  title: "Cost Distribution by Funding Block"
  type: "pie"
  x_axis: "block_funding"
  y_axis: "total_cost"
  show_percentage: true
  show_legend: true

# Format options
format:
  currency: true
  decimal_places: 0
