# Cost by State (with JOIN to regions table)
# Standard SQL Query with JOIN

sql: |
  SELECT
    r.state,
    r.region,
    COUNT(DISTINCT c.user_id) as user_count,
    SUM(c.total_cost) as total_cost,
    AVG(c.total_cost) as avg_cost,
    AVG(c.efficient_score) as avg_efficiency
  FROM cost_report c
  JOIN regions r ON c.user_id = r.user_id
  GROUP BY r.state, r.region
  ORDER BY total_cost DESC

# Chart configuration
chart:
  title: "Cost by State"
  type: "bar"
  x_axis: "state"
  y_axis: "total_cost"
  x_label: "State"
  y_label: "Total Cost ($)"
  show_values: true

# Display as table
display:
  type: "both"
  rows_per_page: 20
  sortable: true

# Format options
format:
  currency: true
  decimal_places: 0
