<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Ingest Runner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Data Ingest Runner</h1>
        </header>

        <div class="main-content">
            <!-- Control Panel -->
            <div class="control-panel">
                <div class="form-group">
                    <label for="environment">Environment:</label>
                    <div class="env-row">
                        <select id="environment" required>
                            <option value="">-- Select Environment --</option>
                        </select>
                        <label class="checkbox-label">
                            <input type="checkbox" id="set-default">
                            Default
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Enter password">
                    <small id="cached-msg" style="display: none; color: #28a745;">✓ Password saved in browser</small>
                </div>

                <div class="form-group">
                    <label for="directory-path">Directory Path:</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="directory-path" placeholder="e.g., /Users/data/ingest" style="flex: 1;">
                        <button id="browse-btn" class="btn btn-secondary" type="button">Browse...</button>
                    </div>
                    <small style="color: #999; display: block; margin-top: 4px;">Full path where files are located</small>
                </div>

                <div class="form-group">
                    <label>Select Files:</label>
                    <div id="file-browser" class="file-browser" style="display: none;">
                        <div class="browser-header">
                            <div class="browser-nav">
                                <button id="browser-back" class="btn btn-sm">← Back</button>
                                <span id="browser-current-path" class="browser-path">/</span>
                                <button id="browser-close" class="btn btn-sm">✕ Close</button>
                            </div>
                            <div id="quick-locations" class="quick-locations"></div>
                        </div>
                        <div id="browser-items" class="browser-items"></div>
                        <div class="browser-footer">
                            <button id="browser-select" class="btn btn-primary">Select Files</button>
                        </div>
                    </div>
                    <div id="file-list" class="file-list"></div>
                </div>

                <div class="button-group">
                    <button id="ingest-btn" class="btn btn-primary">Ingest</button>
                    <button id="stop-btn" class="btn btn-danger" style="display: none;">Stop</button>
                    <button id="clear-btn" class="btn btn-secondary">Clear</button>
                </div>
            </div>

            <!-- Output Panel -->
            <div class="output-panel">
                <div class="output-header">
                    <h2>Output</h2>
                    <span id="status" class="status idle">Ready</span>
                </div>
                <div id="output" class="output-viewer"></div>
            </div>
        </div>

        <footer>
            <p>Data Ingest Runner v1.0</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
